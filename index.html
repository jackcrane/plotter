<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Line Drawer</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #111;
        color: #ddd;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }

      .wrap {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .bar {
        padding: 10px 12px;
        display: flex;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid #222;
        background: #0f0f0f;
        user-select: none;
      }

      .bar code {
        background: #1b1b1b;
        padding: 2px 6px;
        border-radius: 6px;
      }

      .bar button {
        background: #1f1f1f;
        color: #ddd;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .bar .actions {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }

      .bar button:hover {
        background: #2a2a2a;
      }

      canvas {
        width: 700px;
        height: 520px;
        display: block;
        background: #000;
        cursor: crosshair;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="bar">
        <div><strong>Line tool</strong></div>
        <div>Left click: add point</div>
        <div><code>Right click</code>: end</div>
        <div class="actions">
          <button id="upload-scad-btn" type="button">Upload Drum</button>
          <button id="download-scad-btn" type="button">Download SCAD</button>
        </div>
      </div>
      <canvas id="c"></canvas>
      <input
        id="upload-scad-input"
        type="file"
        accept=".scad,text/plain"
        hidden
      />
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
